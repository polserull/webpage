<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="=D">
  <title>Foxonaut</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
  crossorigin=""/>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
  <link rel="shortcut icon" href="./images/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="./scripts/style.css">
</head>

<body>
  <div class="top-navbar">
    <img src="./images/profile.webp" width="10%" alt="Foxonaut Logo"></img>
    <h4 style="margin-left: 10px; " class="roboto-regular">Foxonaut</h4>
    <div class="navbar-ico">
      <a class="navbar-link"><i class="glyphicon glyphicon-home"></i></a>
      <a class="navbar-link"><i class="glyphicon glyphicon-cog"></i></a>
      <a class="navbar-link"><i class="glyphicon glyphicon-info-sign"></i></a>
    </div>
  </div>

  <div style="height: 157vw; border-radius: 10px;" id="map"></div>

  <div class="bottom">
    <button style="margin-left: 20px;" class="map-button" id="generateCoord">ANOMALY</button>
    <button class="map-button" id="generateQuantumCoord">QUANTUM</button>
    <div class="slidecontainer">
      <input type="range" min="750" max="4750" value="750" class="slider" id="myRange">
    </div>
  </div>
</body>
</html>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
crossorigin=""></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script type="text/javascript">
  var circle;
    var marker = null;
    var map = L.map('map').setView([51.505, -0.09], 13);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);

    function onLocationFound(e) {
      var radius = e.accuracy;

      L.marker(e.latlng).addTo(map);
      L.circle(e.latlng, radius).addTo(map);

      circle = L.circle(e.latlng, {
        color: 'red',
        fillColor: '#f03',
        fillOpacity: 0.5,
        radius: 10
      }).addTo(map);
    }

    function onLocationError(e) {
      alert(e.message);
    }

    map.on('locationfound', onLocationFound);
    map.on('locationerror', onLocationError);

    map.locate({ setView: true, maxZoom: 16 });

    var slider = document.getElementById("myRange");
    slider.oninput = function() {
      circle.setRadius(this.value);
    }

    // Function to generate a random coordinate within the circle
    function getRandomCoordinateInCircle(circle) {
      var center = circle.getLatLng();
      var radius = circle.getRadius();
      
      // Convert radius from meters to degrees
      var radiusInDegrees = radius / 111000;

      var u = Math.random();
      var v = Math.random();
      var w = radiusInDegrees * Math.sqrt(u);
      var t = 2 * Math.PI * v;
      var x = w * Math.cos(t);
      var y = w * Math.sin(t);

      var newLat = center.lat + x;
      var newLng = center.lng + y;

      return [newLat, newLng];
    }

    function addMarker(coords) {
      if (marker) {
        map.removeLayer(marker);
      }
      marker = L.marker(coords).addTo(map);
    }

    document.getElementById('generateCoord').addEventListener('click', function() {
      if (circle) {
        var randomCoord = getRandomCoordinateInCircle(circle);
        addMarker(randomCoord);
        document.getElementById('coordOutput').innerText = 'Random Coordinate: ' + randomCoord[0].toFixed(6) + ', ' + randomCoord[1].toFixed(6);
      } else {
        alert('Circle is not defined yet.');
      }
    });

    // Function to generate random coordinate using quantum random numbers
    function getQuantumRandomCoordinateInCircle(circle) {
      $.ajax({
        url: 'https://qrng.anu.edu.au/API/jsonI.php?length=10&type=uint8',
        method: 'GET',
        success: function(data) {
          if (data.success) {
            var randomNumbers = data.data;
            var center = circle.getLatLng();
            var radius = circle.getRadius();
            
            // Convert radius from meters to degrees
            var radiusInDegrees = radius / 111000;

            var u = randomNumbers[0] / 255;
            var v = randomNumbers[1] / 255;
            var w = radiusInDegrees * Math.sqrt(u);
            var t = 2 * Math.PI * v;
            var x = w * Math.cos(t);
            var y = w * Math.sin(t);

            var newLat = center.lat + x;
            var newLng = center.lng + y;

            var randomCoord = [newLat, newLng];
            addMarker(randomCoord);
            document.getElementById('coordOutput').innerText = 'Quantum Random Coordinate: ' + randomCoord[0].toFixed(6) + ', ' + randomCoord[1].toFixed(6);
          } else {
            alert('Failed to retrieve quantum random numbers.');
          }
        },
        error: function() {
          alert('Error in API request.');
        }
      });
    }

    document.getElementById('generateQuantumCoord').addEventListener('click', function() {
      if (circle) {
        getQuantumRandomCoordinateInCircle(circle);
      } else {
        alert('Circle is not defined yet.');
      }
    });
</script>
