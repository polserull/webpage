          17┊Mozzie + Ace┊☈
        </section>
      </article>
	  
      <article class="stuff" data-page="stuff">
        <header>
          <h2 class="h2 article-title">Stuff</h2>
        </header>
        <section class="projects">
          <ul class="filter-list">
            <li class="filter-item">
              <button class="active" data-filter-btn>All</button>

            <li class="filter-item">

              </li>
              <li class="select-item">
                <button data-select-item>Stuff</button>

                    <ion-icon name="eye-outline"></ion-icon>
                  </div>

                <h3 class="project-title">European Railways Addon</h3>
                <p class="project-category">Minecraft Mod - Java</p>
              </a>
            </li>
			
			<li class="project-item  active" data-filter-item data-category="minecraft mods">
              <a href="https://github.com/TalonFloof/EnhancedWeather">
                <figure class="project-img">
                  <div class="project-item-icon-box">
                    <ion-icon name="eye-outline"></ion-icon>
                  </div>
                  <img src="./assets/images/projects/enhanced-weather.webp" alt="arrival" loading="lazy">
                </figure>
                <h3 class="project-title">Enhanced Weather</h3>
                <p class="project-category">By TalonFloof - Contributed</p> 
              </a>
            </li>
          </ul>
        </section>
      </article>
